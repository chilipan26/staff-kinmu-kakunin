<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>出発確認</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --line:#e3e5ea;
    --txt:#1d1f24; --sub:#6b7079; --accent:#4361EE;
    --ok-bg:#e7f4ea; --ok-tx:#1e7a3c;
    --warn-bg:#fdecea; --warn-tx:#b3271e;
    --wait-bg:#eef0f3; --wait-tx:#5a6069;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    line-height:1.7;padding:18px 14px 40px;}
  .head{margin:4px 4px 18px;}
  .head h1{font-size:26px;font-weight:700;margin:0;}
  .daylabel{font-size:19px;font-weight:700;color:var(--sub);margin:24px 4px 10px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 18px;margin-bottom:14px;}
  .card .top{display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .pill{font-size:17px;font-weight:700;padding:6px 16px;border-radius:24px;}
  .pill.ok{background:var(--ok-bg);color:var(--ok-tx);}
  .pill.warn{background:var(--warn-bg);color:var(--warn-tx);}
  .pill.wait{background:var(--wait-bg);color:var(--wait-tx);}
  .meet{font-size:18px;color:var(--sub);}
  .meet b{font-size:30px;font-weight:700;color:var(--txt);margin-left:5px;}
  .ev{font-size:24px;font-weight:700;margin:4px 0 16px;}
  .grid{display:flex;flex-direction:column;gap:12px;font-size:21px;}
  .grid .lb{display:block;color:var(--sub);font-size:16px;margin-bottom:1px;}
  .grid .vl{font-weight:700;}
  .limit{margin-top:16px;background:var(--accent);color:#fff;border-radius:12px;
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .limit span{font-size:18px;}
  .limit b{font-size:30px;font-weight:700;}
  .state{padding:50px 16px;text-align:center;color:var(--sub);font-size:20px;}
  .err{color:var(--warn-tx);}
</style>
</head>
<body>

<div class="head">
  <h1 id="title">勤務情報</h1>
</div>

<div id="app"><div class="state">読み込み中…</div></div>

<script>
  // ▼▼▼ ここだけ自分の値に差し替え ▼▼▼
  var LIFF_ID = "2010311386-bDypK7p5";   // スタッフ控えLIFFのLIFF ID
  var GAS_URL = "https://script.google.com/macros/s/AKfycby526aLBiPtUEuNll856wQvCI_GTnjlZO8RU8n4ffM7Q7vffa3T8hT0xrWYlAmbKNF1WQ/exec";
  // ▲▲▲ ここまで ▲▲▲

  var app = document.getElementById("app");

  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  function pillClass(disp){
    if(disp.indexOf("無事")>=0) return "ok";
    if(disp.indexOf("遅刻")>=0||disp.indexOf("未報告")>=0||disp.indexOf("欠席")>=0) return "warn";
    return "wait";
  }

  function rowHTML(lb,val){
    if(!val) return "";
    return '<div><span class="lb">'+lb+'</span><span class="vl">'+esc(val)+'</span></div>';
  }

  function cardHTML(r){
    var meet = r.meetTime ? '<span class="meet">集合<b>'+esc(r.meetTime)+'</b></span>' : '';
    var limit = r.lastLimit
      ? '<div class="limit"><span>間に合う最終出発</span><b>'+esc(r.lastLimit)+'</b></div>' : '';

    // 移動区分でラベルを出し分け（電車→電車の出発／ピック→ピック時間／なし等→非表示）
    var trLabel = "";
    if (r.transport.indexOf("電車") >= 0) trLabel = "電車の出発";
    else if (r.transport.indexOf("ピック") >= 0) trLabel = "ピック時間";

    return '<div class="card">'
      + '<div class="top"><span class="pill '+pillClass(r.dispStatus)+'">'+esc(r.dispStatus)+'</span>'+meet+'</div>'
      + '<div class="ev">'+esc(r.event||"（現場未設定）")+'</div>'
      + '<div class="grid">'
      +   rowHTML("自宅出発予定", r.departTime)
      +   rowHTML("到着予定", r.arriveTime)
      +   rowHTML("移動", r.transport)
      +   rowHTML(trLabel, r.transportTime)
      +   rowHTML("ピック場所", r.pickup)
      +   (r.reportedAt ? rowHTML("出発報告", r.reportedAt+" 済") : "")
      + '</div>'
      + limit
      + '</div>';
  }

  function render(data){
    var t = data.today || "";
    var mmdd = "";
    var m = t.match(/^\d{4}-(\d{2})-(\d{2})$/);
    if(m){ mmdd = Number(m[1]) + "月" + Number(m[2]) + "日"; }
    document.getElementById("title").textContent = (mmdd ? mmdd : "") + "の勤務情報";
    var recs = data.records || [];
    if(recs.length === 0){
      app.innerHTML = '<div class="state">今日・明日の予定はありません。</div>';
      return;
    }
    var today = recs.filter(function(r){return r.isToday;});
    var tomo  = recs.filter(function(r){return !r.isToday;});
    var html = "";
    if(today.length){ html += '<div class="daylabel">本日</div>' + today.map(cardHTML).join(""); }
    if(tomo.length){  html += '<div class="daylabel">明日</div>'  + tomo.map(cardHTML).join("");  }
    app.innerHTML = html;
  }

  function loadFor(uid){
    var url = GAS_URL + "?mode=self&uid=" + encodeURIComponent(uid);
    fetch(url, { method:"GET", redirect:"follow" })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data.status !== "ok"){
          app.innerHTML = '<div class="state err">読み込みエラー：'+esc(data.message||"")+'</div>';
          return;
        }
        render(data);
      })
      .catch(function(e){
        app.innerHTML = '<div class="state err">通信エラーが発生しました。電波の良い場所で開き直してください。</div>';
      });
  }

  liff.init({ liffId: LIFF_ID })
    .then(function(){
      if(!liff.isLoggedIn()){ liff.login(); return; }
      return liff.getProfile().then(function(p){ loadFor(p.userId); });
    })
    .catch(function(e){
      app.innerHTML = '<div class="state err">LIFFの起動に失敗しました。リッチメニューから開き直してください。</div>';
    });
</script>
</body>
</html>
